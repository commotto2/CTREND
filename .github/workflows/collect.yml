name: CTREND Data Collection

on:
  schedule:
    # 매일 한국시간 오전 9시 (UTC 00:00) 실행
    - cron: '0 0 * * *'
  workflow_dispatch:
    # 수동 실행 버튼도 활성화 (언제든 원할 때 바로 실행 가능)

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 40   # 최대 40분 (250개 × 3초 = 약 15분, 여유 있게)

    steps:
      # 1. 레포 체크아웃 (DB 파일 포함)
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Python 설치
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 의존 라이브러리 설치
      - name: Install dependencies
        run: pip install requests pandas numpy tqdm

      # 4. 수집 실행
      - name: Run collection
        run: python build_crypto_db.py

      # 5. DB 파일이 변경됐으면 자동 commit & push
      - name: Commit updated DB
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add crypto_db.sqlite collection_log.txt
          # 변경사항 있을 때만 commit (없으면 종료)
          git diff --staged --quiet || git commit -m "chore: update crypto_db $(date +'%Y-%m-%d')"
          git push
